services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=java_platzi_play_db'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d java_platzi_play_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/data/postgres
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      # Here we use 'db' (the service name) instead of localhost!
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/java_platzi_play_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=secret
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  pgdata:
